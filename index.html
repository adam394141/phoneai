<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#F7F6F2">
<title>AI 社群帶貨實戰班 — Prompt 工具箱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F6F2;--surface:#fff;--surface-alt:#F0EDE6;--border:#E2DDD4;--border-lt:#EBE8E1;--accent:#FCC800;--accent-soft:rgba(252,200,0,.15);--accent-hover:rgba(252,200,0,.25);--accent-dk:#D4A800;--dark:#1C1B18;--txt:#1C1B18;--txt2:#6B6560;--txt3:#9B9590;--ok:#2D8A56;--ok-bg:rgba(45,138,86,.1);--r:14px;--rs:10px;--sh:0 1px 3px rgba(28,27,24,.06);--shm:0 4px 12px rgba(28,27,24,.08);--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%;overflow-x:hidden;overscroll-behavior:none}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--txt);min-height:100dvh;overflow-x:hidden;-webkit-overflow-scrolling:touch;touch-action:manipulation}
/* ── Header ── */
.hd{position:sticky;top:0;z-index:100;background:rgba(247,246,242,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:clamp(10px,3vw,14px) clamp(12px,4vw,16px) 0}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:clamp(8px,2.5vw,12px);gap:8px}
.br{display:flex;align-items:center;gap:clamp(6px,2vw,10px);min-width:0}
.br-i{width:clamp(32px,9vw,38px);height:clamp(32px,9vw,38px);background:var(--dark);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:clamp(14px,4vw,16px);color:var(--accent);font-weight:900;flex-shrink:0}
.br-t h1{font-size:clamp(13px,3.8vw,15px);font-weight:900;color:var(--txt);letter-spacing:.3px;white-space:nowrap}
.br-t span{font-size:clamp(10px,2.8vw,11px);color:var(--txt3);display:block}
/* ── Day Toggle ── */
.dt{display:flex;background:var(--surface-alt);border-radius:10px;padding:3px;gap:2px;border:1px solid var(--border-lt);flex-shrink:0}
.db{padding:clamp(6px,1.8vw,8px) clamp(10px,3vw,14px);font-size:clamp(11px,3vw,13px);font-weight:700;color:var(--txt3);background:0 0;border:none;border-radius:8px;cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap;min-height:36px;touch-action:manipulation}
.db.on{background:var(--dark);color:var(--accent);box-shadow:var(--sh)}
/* ── Module Tabs ── */
.tabs{display:flex;gap:clamp(5px,1.5vw,6px);overflow-x:auto;scrollbar-width:none;padding:4px 0 clamp(10px,3vw,12px);scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;scroll-snap-align:start;padding:clamp(7px,2vw,9px) clamp(10px,3vw,14px);font-size:clamp(12px,3.3vw,13px);font-weight:500;color:var(--txt2);background:var(--surface);border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap;user-select:none;box-shadow:var(--sh);min-height:36px;display:flex;align-items:center;touch-action:manipulation}
.tab.on{background:var(--dark);color:var(--accent);border-color:var(--dark);font-weight:700}
/* ── Content ── */
.ct{padding:clamp(12px,4vw,16px);padding-bottom:calc(100px + var(--safe-b));max-width:600px;margin:0 auto;width:100%}
.mh{margin-bottom:clamp(16px,4vw,20px)}
.mn{font-size:clamp(10px,2.8vw,11px);font-weight:900;color:var(--accent-dk);text-transform:uppercase;letter-spacing:2.5px;margin-bottom:6px}
.mt{font-size:clamp(18px,5.5vw,22px);font-weight:900;line-height:1.3;color:var(--dark);margin-bottom:6px}
.md{font-size:clamp(12px,3.3vw,13px);color:var(--txt2);line-height:1.6}
.mtl{display:inline-flex;align-items:center;gap:4px;margin-top:8px;background:var(--surface-alt);border:1px solid var(--border-lt);padding:4px 10px;border-radius:6px;font-size:clamp(10px,2.8vw,11px);font-weight:700;color:var(--txt2)}
/* ── Prompt Cards ── */
.pc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:clamp(12px,3.5vw,14px);overflow:hidden;box-shadow:var(--sh);transition:box-shadow .2s,border-color .2s}
.pc:active{box-shadow:var(--shm);border-color:var(--accent)}
.pl{display:flex;align-items:center;justify-content:space-between;padding:clamp(10px,3vw,12px) clamp(12px,4vw,16px);border-bottom:1px solid var(--border-lt);background:var(--surface-alt);gap:8px}
.pl-l{display:flex;align-items:center;gap:clamp(6px,2vw,8px);min-width:0}
.pl-i{width:clamp(26px,7vw,28px);height:clamp(26px,7vw,28px);background:var(--accent-soft);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:clamp(12px,3.5vw,14px);flex-shrink:0}
.pl-t{font-size:clamp(13px,3.6vw,14px);font-weight:700;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ptg{font-size:clamp(9px,2.5vw,10px);font-weight:700;color:var(--txt3);background:var(--surface);padding:3px 8px;border-radius:5px;border:1px solid var(--border-lt);letter-spacing:.5px;flex-shrink:0}
.pb{padding:clamp(12px,3.5vw,14px) clamp(12px,4vw,16px)}
.pt{font-size:clamp(13px,3.6vw,14px);line-height:1.75;color:var(--txt);white-space:pre-wrap;word-break:break-word}
.pt .f{color:var(--accent-dk);font-weight:700;background:var(--accent-soft);padding:1px 4px;border-radius:4px;display:inline}
.pn{margin-top:10px;font-size:clamp(11px,3vw,12px);color:var(--txt2);line-height:1.5;padding:8px 10px;background:var(--surface-alt);border-radius:8px;border-left:3px solid var(--accent)}
/* ── Copy Button — 44px min tap target ── */
.cb{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:clamp(14px,4vw,16px);background:var(--accent-soft);border:none;border-top:1px solid var(--border-lt);color:var(--dark);font-size:clamp(13px,3.6vw,14px);font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;user-select:none;min-height:48px;touch-action:manipulation}
.cb:active{background:var(--accent-hover);transform:scale(.98)}
.cb.ok{background:var(--ok-bg);color:var(--ok)}
.cb svg{width:17px;height:17px;flex-shrink:0}
/* ── Section Divider ── */
.sd{display:flex;align-items:center;gap:12px;margin:clamp(18px,5vw,24px) 0 clamp(12px,3.5vw,16px)}
.sd::before,.sd::after{content:'';flex:1;height:1px;background:var(--border)}
.sd span{font-size:clamp(10px,2.8vw,11px);font-weight:700;color:var(--txt3);letter-spacing:2px;white-space:nowrap}
/* ── Info Card ── */
.ic{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:var(--r);padding:clamp(12px,4vw,16px);margin-bottom:clamp(12px,3.5vw,14px);box-shadow:var(--sh)}
.ic .it{font-size:clamp(13px,3.6vw,14px);font-weight:700;color:var(--dark);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ic .ib{font-size:clamp(12px,3.3vw,13px);line-height:1.8;color:var(--txt2);white-space:pre-wrap}
.ic .ib strong{color:var(--dark);font-weight:700}
/* ── Tip Banner ── */
.tb{background:var(--accent-soft);border:1px solid rgba(252,200,0,.25);border-radius:var(--rs);padding:clamp(10px,3vw,12px) clamp(12px,3.5vw,14px);margin-bottom:clamp(16px,4vw,20px);display:flex;align-items:flex-start;gap:10px;font-size:clamp(12px,3.3vw,13px);color:var(--txt2);line-height:1.5}
.tb .ti{font-size:16px;flex-shrink:0;margin-top:1px}
.tb strong{color:var(--dark)}
/* ── Toast ── */
.toast{position:fixed;bottom:calc(24px + var(--safe-b));left:50%;transform:translateX(-50%) translateY(100px);background:var(--dark);color:var(--accent);padding:12px 24px;border-radius:30px;font-size:clamp(13px,3.6vw,14px);font-weight:700;z-index:1000;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;box-shadow:0 8px 30px rgba(28,27,24,.2);max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
/* ── Animation ── */
@keyframes fu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.mc>*{animation:fu .25s ease forwards}
.mc>*:nth-child(2){animation-delay:.03s}.mc>*:nth-child(3){animation-delay:.06s}.mc>*:nth-child(4){animation-delay:.09s}.mc>*:nth-child(5){animation-delay:.12s}.mc>*:nth-child(6){animation-delay:.15s}.mc>*:nth-child(7){animation-delay:.18s}
/* ── Footer ── */
.ft{text-align:center;padding:20px 16px calc(32px + var(--safe-b));font-size:clamp(10px,2.8vw,11px);color:var(--txt3)}
/* ── Small phones (SE, mini) ── */
@media(max-width:374px){
.br-t h1{font-size:12px}.br-t span{display:none}
.tab{padding:6px 10px;font-size:11px}
.mt{font-size:17px}
.pl-t{font-size:12px}
.pt{font-size:12.5px}
}
/* ── Tablet / Desktop ── */
@media(min-width:768px){
.ct{padding:24px;padding-bottom:120px}
.hd{padding:16px 24px 0}
.tabs{gap:8px}
.tab{padding:9px 18px;font-size:14px}
.mt{font-size:26px}
.pt{font-size:15px}
.cb{padding:16px;font-size:15px}
}
</style>
</head>

<div class="br"><div class="br-i">華</div><div class="br-t"><h1>Prompt 工具箱</h1><span>AI 社群帶貨實戰班</span></div></div>

function sD(d){cDay=d;document.querySelectorAll('.db').forEach((b,i)=>b.classList.toggle('on',i+1===d));cMod=D[d][0].id;rT();rM()}
function rT(){const ms=D[cDay],te=document.getElementById('tabs');te.innerHTML=ms.map(m=>`<div class="tab${m.id===cMod?' on':''}" data-m="${m.id}">${m.tl}</div>`).join('');te.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{cMod=+t.dataset.m;te.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));t.classList.add('on');t.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});rM();window.scrollTo({top:0,behavior:'smooth'})})})}
function rM(){const m=[...D[1],...D[2]].find(x=>x.id===cMod);if(!m)return;let h='<div class="mc"><div class="mh"><div class="mn">MODULE '+m.n+'</div><div class="mt">'+m.t+'</div><div class="md">'+m.d+'</div><div class="mtl">🛠️ '+m.tool+'</div></div>';

m.p.forEach(p=>{const dt=p.t.replace(/\[([^\]]+)\]/g,'<span class="f">[$1]</span>');const enc=encodeURIComponent(p.t);
h+=`<div class="pc"><div class="pl"><div class="pl-l"><div class="pl-i">${p.i}</div><div class="pl-t">${p.l}</div></div><div class="ptg">${m.tool}</div></div><div class="pb"><div class="pt">${dt}</div>${p.nt?`<div class="pn">${p.nt}</div>`:''}</div><button class="cb" onclick="cp(this,'${enc}')">${svgCopy} 複製 Prompt</button></div>`});
h+='</div>';document.getElementById('ct').innerHTML=h}
function cp(b,e){const t=decodeURIComponent(e);if(navigator.clipboard&&window.isSecureContext){navigator.clipboard.writeText(t).then(()=>sc(b)).catch(()=>fb(b,t))}else{fb(b,t)}}
function fb(b,t){const ta=document.createElement('textarea');ta.value=t;ta.setAttribute('readonly','');ta.style.cssText='position:fixed;top:0;left:0;width:2em;height:2em;padding:0;border:none;outline:none;box-shadow:none;background:transparent;font-size:16px;opacity:0.01';document.body.appendChild(ta);if(/ipad|iphone|ipod/i.test(navigator.userAgent)){const r=document.createRange();r.selectNodeContents(ta);const s=window.getSelection();s.removeAllRanges();s.addRange(r);ta.setSelectionRange(0,999999)}else{ta.focus();ta.select()}let ok=false;try{ok=document.execCommand('copy')}catch(e){}document.body.removeChild(ta);if(ok){sc(b)}else{window.prompt('長按下方文字全選複製：',t)}}
function sc(b){const o=b.innerHTML;b.classList.add('ok');b.innerHTML=svgOk+' 已複製';const ts=document.getElementById('toast');ts.classList.add('show');setTimeout(()=>{b.classList.remove('ok');b.innerHTML=o;ts.classList.remove('show')},1500)}
rT();rM();
